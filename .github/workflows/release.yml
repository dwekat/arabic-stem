name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # registry-url wires NODE_AUTH_TOKEN into .npmrc for npm publish.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build # prebuild lints and tests

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json matches tag
        run: |
          pkg=$(node -p "require('./package.json').version")
          tag="${{ steps.version.outputs.version }}"
          if [ "$pkg" != "$tag" ]; then
            echo "package.json version ($pkg) does not match tag ($tag)"; exit 1
          fi

      - name: Publish to npm
        run: |
          set -euo pipefail
          if npm view "arabic-stem@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "npm: arabic-stem@${{ steps.version.outputs.version }} already published, skipping"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog for this version
        run: |
          set -euo pipefail
          awk -v v="## ${{ steps.version.outputs.version }}" \
            '$0==v{f=1;next} /^## /&&f{exit} f{print}' CHANGELOG.md > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md # changeset changelog section for this version
          generate_release_notes: true # appends GitHub's commit/PR list below
